<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>Tecbium | Sin conexion</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #050505;
    --panel: rgba(18, 18, 18, 0.92);
    --line: rgba(255, 255, 255, 0.08);
    --text: #f5f5f5;
    --muted: #bcbcbc;
    --accent: #29b6f6;
    --accent-2: #ff3366;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 24px;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: var(--text);
    background:
      radial-gradient(circle at top left, rgba(41, 182, 246, 0.18), transparent 34%),
      radial-gradient(circle at bottom right, rgba(255, 51, 102, 0.14), transparent 30%),
      var(--bg);
  }

  .card {
    width: min(100%, 560px);
    padding: 32px;
    border: 1px solid var(--line);
    border-radius: 28px;
    background: var(--panel);
    backdrop-filter: blur(18px);
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.38);
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.05);
    color: var(--muted);
    font-size: 14px;
  }

  h1 {
    margin: 20px 0 12px;
    font-size: clamp(32px, 7vw, 52px);
    line-height: 1;
  }

  p {
    margin: 0;
    color: var(--muted);
    font-size: 16px;
    line-height: 1.6;
  }

  .actions {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-top: 28px;
  }

  a,
  button {
    appearance: none;
    border: 0;
    border-radius: 14px;
    padding: 14px 18px;
    font: inherit;
    text-decoration: none;
    cursor: pointer;
  }

  .primary {
    background: linear-gradient(135deg, var(--accent), #3478f6);
    color: #fff;
    font-weight: 700;
  }

  .secondary {
    background: rgba(255, 255, 255, 0.06);
    color: var(--text);
  }
</style>
</head>
<body>
  <main class="card">
    <div class="badge">Tecbium PWA</div>
    <h1>Sin conexion</h1>
    <p>No pudimos cargar el contenido en este momento. Cuando vuelva la red, Tecbium seguira funcionando desde la pantalla de inicio y recuperara la pagina automaticamente.</p>
    <div class="actions">
      <button class="primary" type="button" onclick="window.location.reload()">Reintentar</button>
      <a class="secondary" href="/">Ir al inicio</a>
    </div>
  </main>
</body>
</html>
