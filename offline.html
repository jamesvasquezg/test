<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#000000">
  <title>Tecbium | Sin conexion</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #04070d;
      --bg-accent: #11213f;
      --panel: rgba(14, 18, 28, 0.92);
      --text: #ffffff;
      --muted: #b5c2d6;
      --accent: #0ab4d8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Segoe UI", system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(10, 180, 216, 0.2), transparent 32%),
        linear-gradient(135deg, var(--bg), var(--bg-accent));
    }

    main {
      width: min(100%, 560px);
      padding: 32px;
      border-radius: 24px;
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      text-align: center;
    }

    img {
      width: 88px;
      height: 88px;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(1.8rem, 3vw, 2.3rem);
    }

    p {
      margin: 0 0 16px;
      line-height: 1.6;
      color: var(--muted);
    }

    a {
      display: inline-block;
      margin-top: 8px;
      padding: 12px 18px;
      border-radius: 999px;
      color: var(--text);
      background: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main>
    <img src="/icon-192.png" alt="Tecbium">
    <h1>Sin conexion por ahora</h1>
    <p>Tecbium sigue instalado y listo para abrirse, pero necesitas volver a conectarte para cargar las senales en vivo.</p>
    <p>Cuando recuperes internet, vuelve a intentar y la aplicacion retomara el contenido.</p>
    <a href="/">Reintentar</a>
  </main>
</body>
</html>
